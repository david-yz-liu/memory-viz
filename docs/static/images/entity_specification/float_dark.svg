        [data-theme="dark"] text.type,
        [data-theme="dark"] text.value {
            fill: rgb(144, 164, 237);
        }
        [data-theme="dark"] text.id {
            fill: rgb(255, 183, 77);
        }
        [data-theme="dark"] path {
