        }
        path {
            stroke: rgb(0, 0, 0);
        }
        .highlighted path {
            fill: var(--highlight-object-fill) !important;
        }
    
        [data-theme="dark"] {
            --highlight-value-text-color: #110875;
            --highlight-id-text-color: #6e4409;

            --fade-text-color: #BBBBBB;
