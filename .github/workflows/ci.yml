name: Memory Models Tests
on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
    push:
        branches:
            - master

jobs:
    jest:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7
            - name: Set up pnpm
              uses: pnpm/action-setup@v6
            - name: Set up node and cache packages
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install packages
              run: pnpm install --frozen-lockfile
            - name: Compile JavaScript assets
              run: pnpm --filter memory-viz run build
            - name: Run jest tests
              run: pnpm run test-cov
            - name: Coveralls (jest)
              uses: coverallsapp/github-action@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  fail-on-error: false

    build:
        runs-on: ubuntu-latest
        if: github.event.pull_request.draft == false
        steps:
            - uses: actions/checkout@v7
            - name: Set up pnpm
              uses: pnpm/action-setup@v6
            - name: Set up node and cache packages
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install packages
              run: pnpm install --frozen-lockfile
            - name: Build docs, demo, and webstepper website
              run: |
                  pnpm --filter memory-viz run build
                  pnpm --filter memory-viz-demo run build
                  pnpm --filter memory-viz-docs run build
                  pnpm --filter memory-viz-webstepper run build
                  mkdir docs/build/demo
                  cp -r demo/dist/* docs/build/demo
            - name: Archive documentation website artifact
              uses: actions/upload-artifact@v7
              with:
                  name: docs
                  path: docs/build
    publish:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: publish-docs
            url: https://www.cs.toronto.edu/~david/memory-viz
        if: github.ref == 'refs/heads/master'
        steps:
            - name: Download documentation website artifact
              uses: actions/download-artifact@v8
              with:
                  name: docs
                  path: docs
            - name: Deploy to Server
              uses: easingthemes/ssh-deploy@main
              with:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  ARGS: "-rlgoDzvc -i --delete"
                  SOURCE: "docs/"
                  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
                  REMOTE_USER: ${{ secrets.REMOTE_USER }}
                  TARGET: ${{ secrets.REMOTE_TARGET }}
                  EXCLUDE: "/dist/, /node_modules/"
